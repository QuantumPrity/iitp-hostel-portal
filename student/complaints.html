<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaints - IITP Hostel</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/complaints.css">
</head>
<body>

    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-logo">
            <a href="dashboard.html">🏠 IITP Hostel Portal</a>
        </div>
        <div class="nav-user">
            <div class="profile-circle">P</div>
            <button onclick="logoutUser()">Logout</button>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="complaints-container">

        <!-- SUBMIT FORM -->
        <div class="section-box">
            <h2>🔧 Submit a Complaint</h2>
            <p class="subtitle">Fill in the details below</p>

            <input type="text" id="room-no" placeholder="Room Number (e.g. A-101)" />
            
            <select id="issue-type">
                <option value="">Select Issue Type</option>
                <option value="Electricity">⚡ Electricity</option>
                <option value="Plumbing">🚿 Plumbing</option>
                <option value="Furniture">🪑 Furniture</option>
                <option value="Internet">🌐 Internet</option>
                <option value="Cleanliness">🧹 Cleanliness</option>
                <option value="Other">📌 Other</option>
            </select>

            <select id="severity">
                <option value="">Select Severity</option>
                <option value="Low">🟢 Low</option>
                <option value="Medium">🟡 Medium</option>
                <option value="High">🔴 High</option>
            </select>

            <textarea id="description" placeholder="Describe your issue in detail..."></textarea>

            <button onclick="submitComplaint()">Submit Complaint</button>
            <div id="msg" class="msg"></div>
        </div>

        <!-- MY COMPLAINTS -->
        <div class="section-box">
            <h2>📋 My Complaints</h2>
            <p class="subtitle">Track status of your complaints</p>
            <div id="complaints-list">
                <p class="loading">Loading...</p>
            </div>
        </div>

    </div>

    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/complaints.js"></script>

</body>
</html>
